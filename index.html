<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="Favicon.png"/>
<meta charset="UTF-8"/>
<title>Office Admin Portal</title>
  <link rel="icon" type="image/png" href="favicon.png"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0f0f13;--surface:#17171f;--surface2:#1e1e2a;--surface3:#262636;--border:#2e2e42;--text:#e8e8f0;--muted:#7a7a9a;--dim:#4a4a6a;--accent:#7c6af7;--accent2:#4fd1c5;--green:#34d399;--red:#f87171;--amber:#fbbf24;--blue:#60a5fa;--pink:#f472b6;--r:12px;--rl:16px}
*{box-sizing:border-box;margin:0;padding:0}html,body{min-height:100vh}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
h1,h2,h3,h4,h5{font-family:'Syne',sans-serif}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:60px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;letter-spacing:-0.5px}.logo span{color:var(--accent)}
.topbar-date{color:var(--muted);font-size:12px}
.tabs{display:flex;gap:2px;padding:14px 28px 0;background:var(--surface);border-bottom:1px solid var(--border)}
.tab{padding:9px 20px;border-radius:9px 9px 0 0;font-family:'Syne',sans-serif;font-weight:600;font-size:13px;cursor:pointer;color:var(--muted);background:transparent;border:none;transition:all 0.2s}
.tab:hover{color:var(--text);background:var(--surface2)}
.tab.active{color:var(--text);background:var(--bg);border:1px solid var(--border);border-bottom:1px solid var(--bg);margin-bottom:-1px}
.main{padding:24px 28px}
.month-bar{display:flex;align-items:center;gap:10px;margin-bottom:22px;flex-wrap:wrap}
.month-bar label{color:var(--muted);font-size:11px;letter-spacing:1px;text-transform:uppercase}
.month-bar select,.month-bar input[type="number"]{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px}
.month-bar select:focus,.month-bar input:focus{outline:none;border-color:var(--accent)}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
@media(max-width:900px){.stats-row{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:18px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--c,var(--accent))}
.stat-label{color:var(--muted);font-size:10px;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:7px}
.stat-value{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;line-height:1.1}
.stat-sub{color:var(--muted);font-size:11px;margin-top:5px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:1050px){.grid2{grid-template-columns:1fr}}
.section-gap{display:flex;flex-direction:column;gap:18px}
.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}
.gap-2{gap:8px}.gap-3{gap:12px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:20px}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.card-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700}
.card-sub{color:var(--muted);font-size:11px;margin-top:3px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:9px;font-family:'Syne',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all 0.15s;white-space:nowrap}
.btn-primary{background:var(--accent);color:white}.btn-primary:hover{background:#6a58e6;transform:translateY(-1px)}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}.btn-ghost:hover{background:var(--surface3)}
.btn-danger{background:transparent;color:var(--red);border:1px solid var(--border);font-size:11px;padding:5px 10px;border-radius:7px;cursor:pointer}.btn-danger:hover{background:rgba(248,113,113,0.08);border-color:var(--red)}
.btn-sm{padding:5px 11px;font-size:11px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:9px 12px;color:var(--muted);font-size:10px;letter-spacing:1.1px;text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--surface2);font-weight:600}
td{padding:11px 12px;border-bottom:1px solid var(--border);vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.018)}
.td-num{font-family:'Syne',sans-serif;font-weight:700}
.floor-pills{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.floor-pill{display:flex;flex-direction:column;align-items:center;background:var(--surface3);border:1px solid var(--border);border-radius:8px;padding:5px 7px;min-width:50px;text-align:center}
.floor-pill-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.floor-pill-val{font-family:'Syne',sans-serif;font-size:13px;font-weight:700}
.floor-pill-unit{font-size:9px;color:var(--dim);margin-top:1px}
.floor-overview-grid{display:grid;gap:8px}
.floor-ov-box{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 8px;text-align:center}
.floor-ov-label{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.floor-ov-val{font-family:'Syne',sans-serif;font-size:20px;font-weight:700}
.floor-ov-unit{font-size:9px;color:var(--dim);margin-top:2px}
.stacked-bar-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)}
.stacked-bar-row:last-child{border-bottom:none}
.stacked-bar-name{width:90px;font-size:11px;font-family:'Syne',sans-serif;font-weight:700;flex-shrink:0}
.stacked-bar{flex:1;height:12px;background:var(--surface3);border-radius:99px;overflow:hidden;display:flex}
.stacked-seg{height:100%;min-width:0}
.progress-bar{background:var(--surface3);border-radius:99px;height:7px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;transition:width 0.4s ease}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600}
.badge-green{background:rgba(52,211,153,0.12);color:var(--green)}.badge-red{background:rgba(248,113,113,0.12);color:var(--red)}
.badge-amber{background:rgba(251,191,36,0.12);color:var(--amber)}.badge-blue{background:rgba(96,165,250,0.12);color:var(--blue)}
.tag{display:inline-block;padding:2px 7px;border-radius:5px;font-size:10px;background:var(--surface3);color:var(--muted)}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:11px;background:var(--surface3);color:var(--text)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(5px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:26px;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;animation:modalIn 0.18s ease}
.modal-wide{max-width:720px}
@keyframes modalIn{from{opacity:0;transform:scale(0.96) translateY(8px)}to{opacity:1;transform:none}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.modal-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700}
.modal-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:22px;line-height:1;padding:2px}.modal-close:hover{color:var(--text)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.form-full{grid-column:1/-1}
@media(max-width:600px){.form-grid,.form-grid3{grid-template-columns:1fr}}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group label{font-size:10px;letter-spacing:1.1px;text-transform:uppercase;color:var(--muted);font-weight:600}
.form-group input,.form-group select,.form-group textarea{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:9px 13px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:14px;width:100%;transition:border-color 0.2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--accent);background:var(--surface3)}
.form-group textarea{resize:vertical;min-height:68px}
.form-divider{height:1px;background:var(--border);margin:18px 0}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
.floor-section{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:18px;margin:4px 0}
.floor-section-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;margin-bottom:3px}
.floor-section-sub{font-size:11px;color:var(--muted);margin-bottom:14px}
.floor-inputs-grid{display:grid;gap:10px}
.floor-input-wrap{display:flex;flex-direction:column;gap:5px;text-align:center}
.floor-input-wrap label{font-size:10px;letter-spacing:1px;text-transform:uppercase;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.floor-input-wrap input{background:var(--surface3);border:1.5px solid var(--border);color:var(--text);padding:9px 4px;border-radius:9px;font-family:'Syne',sans-serif;font-size:16px;font-weight:700;text-align:center;width:100%}
.floor-input-wrap input:focus{outline:none}.floor-input-wrap input.over{color:var(--red)}
.dist-tracker{margin-top:14px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px}
.dist-tracker-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;margin-bottom:7px}
.dist-tracker-label{color:var(--muted)}.dist-tracker-val{font-family:'Syne',sans-serif;font-weight:700}
.dist-bar{background:var(--surface3);border-radius:99px;height:10px;overflow:hidden}
.dist-fill{height:100%;border-radius:99px;transition:width 0.25s,background 0.25s}
.dist-segments{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.dist-seg{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)}
.dist-seg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.bar-chart{display:flex;flex-direction:column;gap:12px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-label{width:115px;font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.bar-track{flex:1;background:var(--surface3);border-radius:99px;height:9px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width 0.5s ease;min-width:2px}
.bar-val{width:75px;text-align:right;font-size:12px;font-family:'Syne',sans-serif;font-weight:700}
.weekly-strip{display:flex;gap:8px}
.week-block{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 6px;text-align:center;cursor:pointer;transition:border-color 0.2s}
.week-block:hover,.week-block.active{border-color:var(--accent)}.week-block.active{background:rgba(124,106,247,0.06)}
.week-label{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.week-val{font-family:'Syne',sans-serif;font-size:14px;font-weight:700}
.notice{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:var(--r);padding:11px 16px;margin-bottom:18px;font-size:12px;color:var(--muted)}
.notice strong{color:var(--text);font-family:'Syne',sans-serif}
.empty-state{text-align:center;padding:40px;color:var(--muted)}
.empty-icon{font-size:38px;margin-bottom:10px}.empty-text{font-size:14px;margin-bottom:6px;color:var(--text)}
.spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin:36px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.text-green{color:var(--green)}.text-red{color:var(--red)}.text-muted{color:var(--muted)}.text-accent{color:var(--accent)}
.fw{font-family:'Syne',sans-serif;font-weight:700}
.manage-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.manage-row:last-child{border-bottom:none}
.edit-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
<style>
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:48px 40px;width:100%;max-width:420px;text-align:center}
.login-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;margin-bottom:8px}.login-logo span{color:var(--accent)}
.login-sub{color:var(--muted);font-size:14px;margin-bottom:36px}
.login-btn{display:inline-flex;align-items:center;gap:12px;padding:14px 28px;background:#0078d4;color:white;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;width:100%;justify-content:center}
.login-btn:hover{background:#006cbe;transform:translateY(-1px)}
.login-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.login-divider{height:1px;background:var(--border);margin:28px 0}
.login-footer{font-size:11px;color:var(--dim)}
.user-chip{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:5px 12px;font-size:12px}
.user-avatar{width:24px;height:24px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;flex-shrink:0}
.logout-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;padding:2px 6px;border-radius:4px}.logout-btn:hover{color:var(--red)}
</style>
<script>
const {useState,useEffect,useCallback} = React;

/* ── CONFIG — update API to your Render URL ── */
const API = 'https://office-admin-portal-backend-f0w9.onrender.com/api';

/* ── MICROSOFT LOGIN CONFIG ── */
const MSAL_CONFIG = {
  auth: {
    clientId: '96585012-1abf-44f6-bdc5-66cd67db2a4d',
    authority: 'https://login.microsoftonline.com/cdf487bc-d06e-4e9f-a2d9-9f3d7f3c08b7',
    redirectUri: window.location.origin + window.location.pathname
  },
  cache: { cacheLocation: 'sessionStorage' }
};
const msalInstance = new msal.PublicClientApplication(MSAL_CONFIG);
const LOGIN_SCOPES = { scopes: ['User.Read'] };

/* ── LOGIN PAGE COMPONENT ── */
function LoginPage({onLogin, loading}){
  return React.createElement('div',{className:'login-page'},
    React.createElement('div',{className:'login-card'},
      React.createElement('div',{className:'login-logo'},'Office',React.createElement('span',null,'Admin'),' Portal'),
      React.createElement('div',{className:'login-sub'},'Sign in with your organizational Microsoft account to continue'),
      React.createElement('div',{className:'login-divider'}),
      React.createElement('button',{className:'login-btn',onClick:onLogin,disabled:loading},
        loading
          ? 'Signing in...'
          : React.createElement(React.Fragment,null,
              React.createElement('svg',{width:'18',height:'18',viewBox:'0 0 23 23',xmlns:'http://www.w3.org/2000/svg'},
                React.createElement('rect',{x:'1',y:'1',width:'10',height:'10',fill:'#f25022'}),
                React.createElement('rect',{x:'12',y:'1',width:'10',height:'10',fill:'#7fba00'}),
                React.createElement('rect',{x:'1',y:'12',width:'10',height:'10',fill:'#00a4ef'}),
                React.createElement('rect',{x:'12',y:'12',width:'10',height:'10',fill:'#ffb900'})
              ),
              'Sign in with Microsoft'
            )
      ),
      React.createElement('div',{className:'login-footer'},'Only authorized organizational accounts can access this portal')
    )
  )
}

const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const FLOOR_COLORS=['#7c6af7','#4fd1c5','#34d399','#fbbf24','#f472b6','#f87171','#60a5fa','#fb923c','#a78bfa','#34d399'];
const PAYMENT_MODES=['cash','card','upi','cheque','bank_transfer','other'];

function fmt(n){return '₹'+Math.round(Number(n)||0).toLocaleString('en-IN')}
function fmtQ(n){return Number(n||0).toFixed(1)}
function pct(a,b){return b>0?Math.min(100,Math.round(a/b*100)):0}
function today(){return new Date().toISOString().split('T')[0]}
function floorColor(idx){return FLOOR_COLORS[idx%FLOOR_COLORS.length]}

/* format date as DD-MM-YYYY */
function fmtDate(d){
  if(!d)return '—';
  const dt=new Date(d);
  if(isNaN(dt))return d;
  const dd=String(dt.getDate()).padStart(2,'0');
  const mm=String(dt.getMonth()+1).padStart(2,'0');
  const yyyy=dt.getFullYear();
  return `${dd}-${mm}-${yyyy}`;
}

/* format timestamp as DD-MM-YYYY, HH:MM IST */
function fmtDateTime(d){
  if(!d)return '—';
  const dt=new Date(d);
  if(isNaN(dt))return d;
  return dt.toLocaleString('en-IN',{
    timeZone:'Asia/Kolkata',
    day:'2-digit',month:'2-digit',year:'numeric',
    hour:'2-digit',minute:'2-digit',hour12:true
  });
}

let _setBackendDown=null;
async function api(method,path,body){
  try{
    const res=await fetch(API+path,{method,headers:{'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined,signal:AbortSignal.timeout(10000)});
    if(!res.ok){const e=await res.json().catch(()=>({error:res.statusText}));throw new Error(e.error||res.statusText)}
    if(_setBackendDown)_setBackendDown(false);
    return await res.json();
  }catch(e){
    if(e.name==='TimeoutError'||e.name==='TypeError'||e.message.includes('fetch')){if(_setBackendDown)_setBackendDown(true)}
    throw e;
  }
}

/* ── ONEDRIVE UPLOAD via Microsoft Graph ── */
const ONEDRIVE_FOLDER = 'ADMIN_TEST';

async function uploadToOneDrive(file, baseFileName) {
  try {
    /* add timestamp to filename so re-uploads never conflict */
    const ext = file.name.split('.').pop();
    const ts = new Date().toISOString().replace(/[-:T]/g,'').slice(0,14);
    const baseName = baseFileName.includes('.') ? baseFileName.substring(0, baseFileName.lastIndexOf('.')) : baseFileName;
    const fileName = baseName + '_' + ts + '.' + ext;

    let tokenResp;
    try {
      tokenResp = await msalInstance.acquireTokenSilent({
        scopes: ['Files.ReadWrite', 'Files.ReadWrite.All'],
        account: msalInstance.getActiveAccount()
      });
    } catch(e) {
      /* silent token failed, try popup */
      tokenResp = await msalInstance.acquireTokenPopup({
        scopes: ['Files.ReadWrite', 'Files.ReadWrite.All']
      });
    }
    const token = tokenResp.accessToken;

    /* upload file */
    const uploadUrl = `https://graph.microsoft.com/v1.0/me/drive/root:/${ONEDRIVE_FOLDER}/${fileName}:/content`;
    const res = await fetch(uploadUrl, {
      method: 'PUT',
      headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': file.type||'application/octet-stream' },
      body: file
    });
    if (!res.ok) {
      const errBody = await res.json().catch(()=>({}));
      throw new Error(errBody?.error?.message || `Upload failed: ${res.status}`);
    }
    const data = await res.json();

    /* create shareable link */
    const linkRes = await fetch(`https://graph.microsoft.com/v1.0/me/drive/items/${data.id}/createLink`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'view', scope: 'organization' })
    });
    const linkData = await linkRes.json();
    return linkData.link?.webUrl || data.webUrl;
  } catch(e) {
    console.error('OneDrive upload error:', e);
    throw e;
  }
}
function Spinner(){return React.createElement('div',{className:'spinner'})}
function StatCard({label,value,sub,color,warn}){
  return React.createElement('div',{className:'stat-card',style:{'--c':color||'var(--accent)'}},
    React.createElement('div',{className:'stat-label'},label),
    React.createElement('div',{className:'stat-value',style:warn?{color:'var(--red)'}:{}},value),
    sub&&React.createElement('div',{className:'stat-sub',style:warn?{color:'var(--red)'}:{}},sub)
  )
}
function Modal({title,onClose,children,wide}){
  return React.createElement('div',{className:'modal-overlay',onClick:e=>e.target===e.currentTarget&&onClose()},
    React.createElement('div',{className:'modal'+(wide?' modal-wide':'')},
      React.createElement('div',{className:'modal-header'},
        React.createElement('div',{className:'modal-title'},title),

      React.createElement('button',{className:'btn btn-primary',onClick:save,disabled:saving},saving?'Saving...':existing?'Update':'Record Spend')
    )
  )
}

function SetBudgetsModal({categories,month,year,onClose,onSaved}){
  const [budgets,setBudgets]=useState({});
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  useEffect(()=>{api('GET',`/budget/monthly?month=${month}&year=${year}`).then(data=>{const b={};(data||[]).forEach(r=>{b[r.category_id]=r.budget_amount});setBudgets(b);setLoading(false)}).catch(()=>setLoading(false))},[month,year]);
  async function save(){setSaving(true);for(const[id,amt]of Object.entries(budgets)){if(amt)await api('POST','/budget/monthly',{category_id:+id,month,year,budget_amount:+amt})}setSaving(false);onSaved()}
  return React.createElement(Modal,{title:`Set Budgets — ${MONTHS[month-1]} ${year}`,onClose},
    loading?React.createElement(Spinner):
    React.createElement('div',null,
      React.createElement('div',{style:{fontSize:'12px',color:'var(--muted)',marginBottom:'16px'}},`Budgets apply to ${MONTHS[month-1]} ${year} only.`),
      React.createElement('div',{className:'section-gap'},
        categories.map(c=>React.createElement('div',{key:c.id,className:'form-group'},
          React.createElement('label',null,`${c.icon||''} ${c.name}`),
          React.createElement('input',{type:'number',placeholder:'₹ Budget amount',value:budgets[c.id]||'',onChange:e=>setBudgets(p=>({...p,[c.id]:e.target.value}))})
        ))
      ),
      React.createElement('div',{className:'form-actions'},
        React.createElement('button',{className:'btn btn-ghost',onClick:onClose},'Cancel'),
        React.createElement('button',{className:'btn btn-primary',onClick:save,disabled:saving},saving?'Saving...':'Save Budgets')
      )
    )
  )
}

function ManageCategoriesModal({categories,onClose,onSaved}){
  const [list,setList]=useState(categories);
  const [editId,setEditId]=useState(null);
  const [editForm,setEditForm]=useState({});
  const [addForm,setAddForm]=useState({name:'',color:'#6366f1',icon:''});
  const [adding,setAdding]=useState(false);
  const [saving,setSaving]=useState(false);
  const PRESETS=['#10b981','#f59e0b','#3b82f6','#8b5cf6','#06b6d4','#ec4899','#6b7280','#f87171','#34d399','#7c6af7'];
  const IS={background:'var(--surface3)',border:'1px solid var(--border)',color:'var(--text)',padding:'7px 8px',borderRadius:'8px',fontSize:'13px'};
  async function saveEdit(id){setSaving(true);await api('PUT',`/budget/categories/${id}`,editForm);setList(p=>p.map(c=>c.id===id?{...c,...editForm}:c));setEditId(null);setSaving(false);onSaved()}
  async function del(id){if(!confirm('Delete? Spends become uncategorised.'))return;await api('DELETE',`/budget/categories/${id}`);setList(p=>p.filter(c=>c.id!==id));onSaved()}
  async function add(){if(!addForm.name.trim())return;setSaving(true);const n=await api('POST','/budget/categories',addForm);setList(p=>[...p,n]);setAddForm({name:'',color:'#6366f1',icon:''});setAdding(false);setSaving(false);onSaved()}
  return React.createElement(Modal,{title:'⚙ Manage Categories',onClose,wide:true},
    React.createElement('div',{style:{marginBottom:'16px'}},
      list.map(cat=>editId===cat.id
        ?React.createElement('div',{key:cat.id,style:{display:'grid',gridTemplateColumns:'1fr 44px 130px auto auto',gap:'8px',alignItems:'center',padding:'8px 0',borderBottom:'1px solid var(--border)'}},
          React.createElement('input',{value:editForm.name,onChange:e=>setEditForm(p=>({...p,name:e.target.value})),style:{...IS,border:'1px solid var(--accent)'}}),
          React.createElement('input',{type:'color',value:editForm.color,onChange:e=>setEditForm(p=>({...p,color:e.target.value})),style:{width:'100%',height:'34px',border:'1px solid var(--border)',borderRadius:'8px',cursor:'pointer',padding:'2px'}}),
          React.createElement('input',{value:editForm.icon,onChange:e=>setEditForm(p=>({...p,icon:e.target.value})),placeholder:'Emoji e.g. 🛒',style:IS}),
          React.createElement('button',{className:'btn btn-primary btn-sm',onClick:()=>saveEdit(cat.id),disabled:saving},'✓'),
          React.createElement('button',{className:'btn btn-ghost btn-sm',onClick:()=>setEditId(null)},'✕')
        )
        :React.createElement('div',{key:cat.id,className:'manage-row'},
          React.createElement('div',{style:{width:'12px',height:'12px',borderRadius:'50%',background:cat.color,flexShrink:0}}),
          React.createElement('div',{style:{fontSize:'16px',width:'24px'}},(cat.icon||'')),
          React.createElement('div',{style:{flex:1,fontFamily:'Syne,sans-serif',fontWeight:700,fontSize:'13px'}},cat.name),
          React.createElement('button',{className:'btn btn-ghost btn-sm',onClick:()=>{setEditId(cat.id);setEditForm({name:cat.name,color:cat.color,icon:cat.icon||''})}},'✎ Edit'),
          React.createElement('button',{className:'btn-danger',onClick:()=>del(cat.id)},'✕')
        )
      )
    ),
    React.createElement('div',{className:'form-divider'}),
    adding?React.createElement('div',null,
      React.createElement('div',{style:{display:'grid',gridTemplateColumns:'1fr 44px 130px auto auto',gap:'8px',alignItems:'center',marginBottom:'10px'}},
        React.createElement('input',{value:addForm.name,onChange:e=>setAddForm(p=>({...p,name:e.target.value})),placeholder:'Category name',style:{background:'var(--surface2)',border:'1px solid var(--accent)',color:'var(--text)',padding:'9px 12px',borderRadius:'9px',fontSize:'14px'}}),
        React.createElement('input',{type:'color',value:addForm.color,onChange:e=>setAddForm(p=>({...p,color:e.target.value})),style:{width:'100%',height:'40px',border:'1px solid var(--border)',borderRadius:'9px',cursor:'pointer',padding:'2px'}}),
        React.createElement('input',{value:addForm.icon,onChange:e=>setAddForm(p=>({...p,icon:e.target.value})),placeholder:'Emoji',style:{background:'var(--surface2)',border:'1px solid var(--border)',color:'var(--text)',padding:'9px 10px',borderRadius:'9px',fontSize:'14px'}}),
        React.createElement('button',{className:'btn btn-primary',onClick:add,disabled:saving},saving?'...':'Add'),
        React.createElement('button',{className:'btn btn-ghost',onClick:()=>setAdding(false)},'✕')
      ),
      React.createElement('div',{style:{display:'flex',gap:'6px',flexWrap:'wrap'}},PRESETS.map(c=>React.createElement('div',{key:c,onClick:()=>setAddForm(p=>({...p,color:c})),style:{width:'22px',height:'22px',borderRadius:'50%',background:c,cursor:'pointer',border:addForm.color===c?'2px solid var(--text)':'2px solid transparent'}})))
    ):React.createElement('button',{className:'btn btn-ghost',onClick:()=>setAdding(true),style:{width:'100%',justifyContent:'center'}},'+ Add New Category'),
    React.createElement('div',{className:'form-actions',style:{marginTop:'20px'}},React.createElement('button',{className:'btn btn-primary',onClick:onClose},'Done'))
  )
}

/* ── BILL UPLOAD CELL ── */
function BillUploadCell({billUrl, onUpload}){
  const [uploading,setUploading]=useState(false);
  const [error,setError]=useState(null);
  const ref=React.useRef();

  async function handleFile(e){
    const file=e.target.files[0];
    if(!file)return;
    setUploading(true);setError(null);
    try{
      await onUpload(file);
    }catch(err){
      setError('Upload failed');
      console.error(err);
    }
    setUploading(false);
    e.target.value='';
  }

  if(uploading) return React.createElement('span',{style:{fontSize:'11px',color:'var(--accent)'}},'Uploading...');

  return React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:'4px'}},
    billUrl
      ? React.createElement('div',{style:{display:'flex',gap:'4px',alignItems:'center'}},
          React.createElement('a',{href:billUrl,target:'_blank',style:{fontSize:'11px',color:'var(--accent2)',textDecoration:'none',display:'flex',alignItems:'center',gap:'3px'}},'📎 View Bill'),
          React.createElement('button',{className:'btn btn-ghost btn-sm',style:{padding:'2px 6px',fontSize:'10px'},onClick:()=>ref.current.click()},'↑')
        )
      : React.createElement('button',{className:'btn btn-ghost btn-sm',style:{fontSize:'10px',padding:'4px 8px'},onClick:()=>ref.current.click()},'📎 Upload'),
    error&&React.createElement('span',{style:{fontSize:'10px',color:'var(--red)'}},error),
    React.createElement('input',{ref,type:'file',accept:'image/*,.pdf',style:{display:'none'},onChange:handleFile})
  )
}

/* ── APP ROOT ── */
function App(){
  const [user,setUser]=useState(null);
  const [loginLoading,setLoginLoading]=useState(true);
  const [tab,setTab]=useState('grocery');
  const [backendDown,setBackendDown]=useState(false);
  const [floors,setFloors]=useState([]);
  const [showManageFloors,setShowManageFloors]=useState(false);
  const now=new Date();
  const [month,setMonth]=useState(now.getMonth()+1);
  const [year,setYear]=useState(now.getFullYear());
  _setBackendDown=setBackendDown;

  /* check if already logged in on page load */
  useEffect(()=>{
    msalInstance.initialize().then(()=>{
      /* handle redirect response first */
      msalInstance.handleRedirectPromise().then(response=>{
        if(response&&response.account){
          msalInstance.setActiveAccount(response.account);
          setUser(response.account);
        } else {
          const accounts=msalInstance.getAllAccounts();
          if(accounts.length>0){
            msalInstance.setActiveAccount(accounts[0]);
            setUser(accounts[0]);
          }
        }
        setLoginLoading(false);
      }).catch(()=>setLoginLoading(false));
    });
  },[]);

  async function login(){
    setLoginLoading(true);
    try{
      await msalInstance.loginRedirect(LOGIN_SCOPES);
    }catch(e){
      console.error('Login failed',e);
      setLoginLoading(false);
    }
  }

  function logout(){
    msalInstance.logoutRedirect({postLogoutRedirectUri: window.location.href});
  }

  const loadFloors=useCallback(async()=>{
    try{const f=await api('GET','/floors');setFloors(f||[])}catch(e){}
  },[]);

  useEffect(()=>{if(user)loadFloors()},[loadFloors,user]);

  /* show loading spinner while checking auth */
  if(loginLoading) return React.createElement('div',{style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)'}},
    React.createElement('div',{className:'spinner'})
  );

  /* show login page if not logged in */
  if(!user) return React.createElement(LoginPage,{onLogin:login,loading:loginLoading});

  /* get user initials for avatar */
  const initials=(user.name||user.username||'U').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);

  return React.createElement('div',null,
    React.createElement('div',{className:'topbar'},
      React.createElement('div',{className:'logo'},'Office',React.createElement('span',null,'Admin'),' Portal'),
      React.createElement('div',{style:{display:'flex',alignItems:'center',gap:'12px'}},
        React.createElement('button',{className:'btn btn-ghost btn-sm',onClick:()=>setShowManageFloors(true)},`🏢 Floors (${floors.length})`),
        React.createElement('div',{className:'user-chip'},
          React.createElement('div',{className:'user-avatar'},initials),
          React.createElement('span',{style:{color:'var(--text)',maxWidth:'160px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},user.name||user.username),
          React.createElement('button',{className:'logout-btn',onClick:logout,title:'Sign out'},'Sign out')
        )
      )
    ),

    backendDown&&React.createElement('div',{style:{background:'rgba(248,113,113,0.1)',borderBottom:'1px solid var(--red)',padding:'10px 28px',display:'flex',alignItems:'center',gap:'12px',fontSize:'13px',color:'var(--red)'}},
      React.createElement('span',null,'⚠'),
      React.createElement('span',null,React.createElement('strong',null,'Cannot reach backend. '),'Data will not be saved.'),
      React.createElement('a',{href:`${API.replace('/api','')}/api/health`,target:'_blank',style:{marginLeft:'auto',color:'var(--red)',fontSize:'12px',textDecoration:'underline'}},'Test ↗')
    ),

    React.createElement('div',{className:'tabs'},
      [{id:'grocery',label:'🛒 Grocery List'},{id:'budget',label:'💰 Budget & Spends'}].map(t=>
        React.createElement('button',{key:t.id,className:`tab${tab===t.id?' active':''}`,onClick:()=>setTab(t.id)},t.label)
      )
    ),

    React.createElement('div',{className:'main'},
      React.createElement('div',{className:'month-bar'},
        React.createElement('label',null,'Viewing:'),
        React.createElement('select',{value:month,onChange:e=>setMonth(+e.target.value)},MONTHS.map((m,i)=>React.createElement('option',{key:i+1,value:i+1},m))),
        React.createElement('input',{type:'number',value:year,onChange:e=>setYear(+e.target.value),style:{width:'88px'}}),
        React.createElement('span',{style:{fontSize:'12px',color:'var(--muted)'}},`Data shown: ${MONTHS[month-1]} ${year} only`)
      ),
      tab==='grocery'&&React.createElement(GroceryTab,{month,year,floors,user,onManageFloors:()=>setShowManageFloors(true)}),
      tab==='budget'&&React.createElement(BudgetTab,{month,year,user})
    ),

    showManageFloors&&React.createElement(ManageFloorsModal,{floors,onClose:()=>setShowManageFloors(false),onSaved:()=>{loadFloors();setShowManageFloors(false)}})
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
